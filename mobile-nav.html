<button aria-label="Toggle menu" id="hamburger-menu-btn">
	<svg class="ham" viewBox="0 0 100 100" width="80" viewbox="0 0 100 100">
		<path class="line top" d="m 70,33 h -40 c 0,0 -6,1.368796 -6,8.5 0,7.131204 6,8.5013 6,8.5013 l 20,-0.0013"></path>
		<path class="line middle" d="m 70,50 h -40"></path>
		<path class="line bottom" d="m 69.575405,67.073826 h -40 c -5.592752,0 -6.873604,-9.348582 1.371031,-9.348582 8.244634,0 19.053564,21.797129 19.053564,12.274756 l 0,-40"></path>
	</svg>
</button>

<div class="" id="nav-menu">
	<nav class="nav-links">
		<a href="work" rel="history">work</a>
		<a href="cv" rel="history">CV</a>
		<a href="contact" rel="history">contact</a>
		<a href="home-1" rel="history">home</a>
	</nav>
</div>

<script>
// Mobile Hamburger Menu Toggle
(function() {
	const hamburgerBtn = document.getElementById('hamburger-menu-btn');
	const hamburgerSvg = hamburgerBtn ? hamburgerBtn.querySelector('.ham') : null;
	const mobileMenu = document.getElementById('nav-menu');
	
	if (hamburgerBtn && hamburgerSvg && mobileMenu) {
		// Disable transitions on page load
		mobileMenu.classList.add('no-transition');
		
		// Enable transitions after a brief delay
		setTimeout(function() {
			mobileMenu.classList.remove('no-transition');
		}, 100);
		
		// Toggle menu
		hamburgerBtn.addEventListener('click', function() {
			const isActive = hamburgerSvg.classList.contains('active');
			
			if (isActive) {
				// Close menu
				hamburgerSvg.classList.remove('active');
				mobileMenu.classList.remove('active');
				document.body.style.overflow = '';
			} else {
				// Open menu
				hamburgerSvg.classList.add('active');
				mobileMenu.classList.add('active');
				document.body.style.overflow = 'hidden';
			}
		});
		
		// Close menu when clicking on overlay
		mobileMenu.addEventListener('click', function(e) {
			if (e.target === mobileMenu) {
				hamburgerSvg.classList.remove('active');
				mobileMenu.classList.remove('active');
				document.body.style.overflow = '';
			}
		});
		
		// Close menu when clicking on a link
		const navLinks = mobileMenu.querySelectorAll('.nav-links a');
		navLinks.forEach(function(link) {
			link.addEventListener('click', function() {
				hamburgerSvg.classList.remove('active');
				mobileMenu.classList.remove('active');
				document.body.style.overflow = '';
			});
		});
	}
})();
</script>
